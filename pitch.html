<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sagi — Platform for Professional Communities</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { background: #080c0a; color: #f9fafb; font-family: 'Inter', sans-serif; overflow-x: hidden; }
    ::selection { background: rgba(42,187,111,.3); }

    .glass { background: rgba(255,255,255,.04); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,.08); }
    .glass-green { background: rgba(42,187,111,.08); border: 1px solid rgba(42,187,111,.2); }
    .glass-purple { background: rgba(139,92,246,.08); border: 1px solid rgba(139,92,246,.2); }
    .glass-blue { background: rgba(59,130,246,.08); border: 1px solid rgba(59,130,246,.2); }

    .grad-text { background: linear-gradient(135deg, #4DCF8A, #2ABB6F, #1E9E5A); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .grad-btn { background: linear-gradient(135deg, #2ABB6F, #1E9E5A); transition: all .3s ease; }
    .grad-btn:hover { background: linear-gradient(135deg, #3DD17D, #2ABB6F); box-shadow: 0 0 32px rgba(42,187,111,.35); transform: translateY(-1px); }

    .hero-bg {
      background:
        radial-gradient(ellipse 90% 55% at 50% -5%, rgba(42,187,111,.14) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 90% 40%, rgba(139,92,246,.07) 0%, transparent 55%),
        #080c0a;
    }
    .section-alt { background: rgba(255,255,255,.02); }

    /* ── Badges ── */
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 12px; border-radius: 100px; font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }
    .badge-green { background: rgba(42,187,111,.12); color: #2ABB6F; border: 1px solid rgba(42,187,111,.25); }
    .badge-purple { background: rgba(139,92,246,.12); color: #a78bfa; border: 1px solid rgba(139,92,246,.25); }
    .badge-blue { background: rgba(59,130,246,.12); color: #60a5fa; border: 1px solid rgba(59,130,246,.25); }
    .badge-amber { background: rgba(245,158,11,.12); color: #fbbf24; border: 1px solid rgba(245,158,11,.25); }

    /* ── Scroll reveal ── */
    .reveal { opacity: 0; transform: translateY(24px); transition: opacity .65s ease, transform .65s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-left { opacity: 0; transform: translateX(-24px); transition: opacity .65s ease, transform .65s ease; }
    .reveal-left.visible { opacity: 1; transform: translateX(0); }
    .reveal-right { opacity: 0; transform: translateX(24px); transition: opacity .65s ease, transform .65s ease; }
    .reveal-right.visible { opacity: 1; transform: translateX(0); }
    .d1{transition-delay:.1s}.d2{transition-delay:.2s}.d3{transition-delay:.3s}.d4{transition-delay:.4s}

    /* ── Cards ── */
    .card-hover { transition: transform .3s ease, box-shadow .3s ease; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,.5); }

    /* ── Divider ── */
    .hr { height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,.07), transparent); }

    /* ── Timeline ── */
    .tl-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .tl-line { width: 2px; background: linear-gradient(180deg, rgba(42,187,111,.4) 0%, rgba(42,187,111,.04) 100%); flex: 1; min-height: 28px; }

    /* ── Map ── */
    @keyframes ping { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.7);opacity:.5} }
    .ping{animation:ping 2s ease-in-out infinite}
    .ping-2{animation:ping 2.4s ease-in-out .4s infinite}
    .ping-3{animation:ping 2.8s ease-in-out .8s infinite}
    .ping-4{animation:ping 2.2s ease-in-out 1.2s infinite}

    /* ── Float ── */
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    .float{animation:float 5s ease-in-out infinite}
    @keyframes float2{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-8px) rotate(-4deg)}}
    .float2{animation:float2 6s ease-in-out .5s infinite}
    @keyframes float3{0%,100%{transform:translateY(0) rotate(4deg)}50%{transform:translateY(-6px) rotate(4deg)}}
    .float3{animation:float3 5.5s ease-in-out 1s infinite}

    /* ── Metric ── */
    .metric{transition:all .3s ease;cursor:default}
    .metric:hover{background:rgba(42,187,111,.06);border-color:rgba(42,187,111,.2);transform:translateY(-2px)}

    /* ── Scrollbar ── */
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#080c0a}
    ::-webkit-scrollbar-thumb{background:rgba(42,187,111,.3);border-radius:3px}

    /* ── Typography ── */
    .hero-title{font-size:clamp(2.2rem,5.5vw,4rem);font-weight:800;line-height:1.08;letter-spacing:-.03em}
    .section-title{font-size:clamp(1.75rem,4vw,2.75rem);font-weight:800;line-height:1.1;letter-spacing:-.025em}

    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
  </style>
</head>

/* ── Scroll Reveal ──────────────────────────────────────────────────────── */
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal,.reveal-left,.reveal-right');
    const obs = new IntersectionObserver(
      entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
      { threshold: 0.1, rootMargin: '0px 0px -30px 0px' }
    );
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

/* ── Header ──────────────────────────────────────────────────────────────── */

      transition: 'all .4s ease',

/* ── Three Roles ─────────────────────────────────────────────────────────── */

function BusinessModal({ biz, onClose, onRequest }) {
  const [status, setStatus] = useState('idle'); // idle | pending | accepted

  function handleRequest() {
    setStatus('pending');
    setTimeout(() => setStatus('accepted'), 1800);
    onRequest && onRequest();
  }

  return (
    <div style={{
      position: 'fixed', inset: 0, zIndex: 200,
      background: 'rgba(0,0,0,.75)', backdropFilter: 'blur(8px)',
      display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '1rem',
      animation: 'fadeIn .2s ease',
    }} onClick={onClose}>
      <div style={{
        background: '#111814', border: '1px solid rgba(255,255,255,.1)',
        borderRadius: 24, width: '100%', maxWidth: 380, overflow: 'hidden',
        animation: 'slideUp .25s ease',
      }} onClick={e => e.stopPropagation()}>

        {/* Photo */}
        <div style={{ position: 'relative', height: 200 }}>
          <img src={biz.photo} alt={biz.name}
            style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
          <div style={{
            position: 'absolute', inset: 0,
            background: 'linear-gradient(to top, rgba(10,14,10,.9) 0%, transparent 60%)',
          }} />
          {biz.tag && (
            <div style={{
              position: 'absolute', top: 12, right: 12,
              background: 'rgba(245,158,11,.9)', color: '#fff',
              fontSize: 10, fontWeight: 700, padding: '3px 10px',
              borderRadius: 100, textTransform: 'uppercase', letterSpacing: '.05em',
            }}>{biz.tag}</div>
          )}
          <button onClick={onClose} style={{
            position: 'absolute', top: 12, left: 12, width: 32, height: 32,
            borderRadius: '50%', background: 'rgba(0,0,0,.5)', border: '1px solid rgba(255,255,255,.2)',
            color: '#fff', fontSize: 18, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>×</button>
          <div style={{ position: 'absolute', bottom: 14, left: 16 }}>
            <div style={{ fontWeight: 800, fontSize: '1.2rem', color: '#fff' }}>{biz.name}</div>
            <div style={{ fontSize: 13, color: 'rgba(255,255,255,.6)' }}>{biz.cat}</div>
          </div>
        </div>

        {/* Body */}
        <div style={{ padding: '20px 20px 24px' }}>
          {/* Discount badge */}
          <div style={{
            display: 'inline-flex', alignItems: 'center', gap: 6,
            background: `${biz.color}18`, border: `1px solid ${biz.color}35`,
            color: biz.color, borderRadius: 100,
            padding: '5px 14px', fontSize: 13, fontWeight: 700, marginBottom: 14,
          }}>
            <span style={{ fontSize: 16 }}>🎁</span> {biz.disc}
          </div>

          <p style={{ color: '#9ca3af', fontSize: 14, lineHeight: 1.6, marginBottom: 20 }}>
            {biz.desc}
          </p>

          {/* Status flow */}
          {status === 'accepted' ? (
            <div style={{
              background: 'rgba(42,187,111,.12)', border: '1px solid rgba(42,187,111,.3)',
              borderRadius: 14, padding: '14px 18px', textAlign: 'center',
            }}>
              <div style={{ fontSize: 22, marginBottom: 4 }}>✅</div>
              <div style={{ color: '#2ABB6F', fontWeight: 700, fontSize: 15 }}>Request sent!</div>
              <div style={{ color: '#6b7280', fontSize: 13, marginTop: 4 }}>The administrator will review and confirm</div>
            </div>
          ) : status === 'pending' ? (
            <div style={{
              background: 'rgba(245,158,11,.1)', border: '1px solid rgba(245,158,11,.3)',
              borderRadius: 14, padding: '14px 18px', textAlign: 'center',
            }}>
              <div style={{ color: '#fbbf24', fontWeight: 700, fontSize: 15 }}>⏳ Pending...</div>
              <div style={{ color: '#6b7280', fontSize: 13, marginTop: 4 }}>Sending request to administrator</div>
            </div>
          ) : (
            <button onClick={handleRequest} style={{
              width: '100%', padding: '14px', borderRadius: 14,
              background: 'linear-gradient(135deg, #2ABB6F, #1E9E5A)',
              color: '#fff', fontWeight: 700, fontSize: 15,
              border: 'none', cursor: 'pointer', transition: 'all .2s ease',
            }}
            onMouseEnter={e => e.target.style.opacity = '.9'}
            onMouseLeave={e => e.target.style.opacity = '1'}>
              Request to Join →
            </button>
          )}

          <p style={{ color: '#4b5563', fontSize: 12, textAlign: 'center', marginTop: 12 }}>
            The community administrator will receive your request
          </p>
        </div>
      </div>
    </div>
  );
}
